<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timetable MVP | Dark Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/pocketbase/dist/pocketbase.umd.js"></script>
    <script defer src="js/app.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen" x-data="timetableApp()">

    <nav class="bg-slate-900 border-b border-slate-800 p-4 mb-6">
        <h1 class="text-xl font-bold text-white max-w-[98%] mx-auto">My Schedule</h1>
    </nav>

    <main class="max-w-[98%] mx-auto px-4 py-4">
        
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 bg-slate-900 p-4 rounded-xl shadow-2xl border border-slate-800">
            <div class="flex items-center gap-4">
                <h2 class="text-xl font-bold text-white" x-text="getHeaderText()"></h2>
                <div class="flex bg-slate-800 rounded-lg p-1 border border-slate-700">
                    <button @click="prev()" class="p-2 hover:bg-slate-700 text-slate-300 rounded-md transition">←</button>
                    <button @click="today()" class="px-4 py-2 hover:bg-slate-700 text-slate-200 rounded-md text-sm font-medium">Today</button>
                    <button @click="next()" class="p-2 hover:bg-slate-700 text-slate-300 rounded-md transition">→</button>
                </div>
            </div>

            <div class="flex bg-slate-800 rounded-lg p-1 border border-slate-700">
                <template x-for="mode in ['year', 'month', 'week', 'day']">
                    <button @click="viewMode = mode" 
                        class="px-4 py-2 rounded-md text-sm font-medium capitalize transition"
                        :class="viewMode === mode ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-400 hover:text-slate-200'"
                        x-text="mode"></button>
                </template>
            </div>
        </div>

        <div class="bg-slate-900 rounded-2xl shadow-2xl border border-slate-800 overflow-hidden min-h-[600px] mb-8">
            
            <template x-if="viewMode === 'year'">
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 p-6 bg-slate-950">
                    <template x-for="(m, mIdx) in grid" :key="'month-container-' + mIdx">
                        <div class="bg-slate-900 p-4 rounded-xl border border-slate-800 shadow-sm cursor-pointer hover:border-blue-500 transition" 
                            @click="currentDate.setMonth(m.index); viewMode = 'month';">
                            <h4 class="font-bold text-slate-200 mb-2 text-sm" x-text="m.name"></h4>
                            <div class="grid grid-cols-7 gap-1">
                                <template x-for="(d, dIdx) in m.days" :key="'month-' + mIdx + '-day-' + dIdx">
                                    <div class="aspect-square flex items-center justify-center">
                                        <span class="text-[9px] w-4 h-4 flex items-center justify-center rounded-full"
                                            :class="d.current ? 'bg-blue-600 text-white' : 'text-slate-600'" x-text="d.day"></span>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <template x-if="viewMode === 'month'">
                <div>
                    <div class="grid grid-cols-7 bg-slate-800/50 border-b border-slate-800">
                        <template x-for="dayName in days">
                            <div class="py-3 text-center text-xs font-bold text-slate-500 uppercase" x-text="dayName"></div>
                        </template>
                    </div>
                    <div class="grid grid-cols-7">
                        <template x-for="(item, idx) in grid" :key="'month-'+idx">
                            <div class="h-32 border-r border-b border-slate-800 p-2 hover:bg-slate-800/40 transition relative group">
                                <span class="text-sm font-medium w-7 h-7 flex items-center justify-center rounded-full"
                                    :class="item.current ? 'bg-blue-600 text-white' : 'text-slate-400'" x-text="item.day"></span>
                                
                                <div class="mt-2 flex flex-col gap-1">
                                    <template x-if="item.dayName">
                                        <template x-for="event in getEventsForDay(item.dayName)" :key="event.id">
                                            <div class="h-1.5 w-full rounded-full" 
                                                :style="'background-color:' + (event.color || '#3b82f6')"
                                                :title="event.name"></div>
                                        </template>
                                    </template>
                                </div>
                            </div>
                        </template>
                    </div>
                </div>
            </template>

            <template x-if="viewMode === 'week'">
                <div class="grid grid-cols-7 divide-x divide-slate-800 min-h-[500px] bg-slate-900">
                    <template x-for="day in grid">
                        <div class="flex flex-col items-center p-2">
                            <span class="text-xs font-bold text-slate-500 uppercase" x-text="day.name"></span>
                            <span class="text-lg font-bold mt-1 w-10 h-10 flex items-center justify-center rounded-full mb-4"
                                :class="day.isToday ? 'bg-blue-600 text-white' : 'text-slate-300'" x-text="day.date"></span>
                            
                            <div class="w-full space-y-2">
                                <template x-for="event in getEventsForDay(day.name)" :key="event.id">
                                    <div class="p-2 border rounded-lg text-center shadow-md transition hover:brightness-125"
                                        :style="getStyle(event.color)">
                                        <p class="text-[10px] font-bold leading-tight" x-text="event.name"></p>
                                        <p class="text-[9px] opacity-90 mt-0.5 font-mono" x-text="event.start_time"></p>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <template x-if="viewMode === 'day'">
                <div class="p-8 flex flex-col items-center min-h-[500px] relative overflow-hidden bg-slate-900">
                    <div class="absolute top-0 right-6 select-none pointer-events-none opacity-10">
                        <span class="text-[12rem] font-black text-white leading-none" x-text="currentDate.getDate()"></span>
                    </div>

                    <div class="text-center w-full max-w-2xl relative z-10">
                        <h3 class="text-4xl font-black text-white tracking-tight">
                            <span x-text="months[currentDate.getMonth()]"></span> 
                            <span x-text="currentDate.getDate() + getDaySuffix(currentDate.getDate())"></span>
                        </h3>
                        <p class="text-blue-500 font-bold uppercase tracking-[0.2em] text-sm mt-2" x-text="days[currentDate.getDay()]"></p>
                        
                        <div class="mt-12 space-y-4">
                            <template x-for="event in events.filter(e => e.day === days[currentDate.getDay()])">
                                <div class="border-l-4 p-4 text-left rounded-r-xl flex justify-between items-center shadow-lg backdrop-blur-sm"
                                    :style="getStyle(event.color)">
                                    <div>
                                        <p class="font-bold text-lg" x-text="event.name"></p>
                                        <p class="text-sm opacity-90 font-mono" x-text="event.start_time"></p>
                                    </div>
                                    <button @click="deleteEvent(event.id)" class="text-white/20 hover:text-red-500 transition">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                        </svg>
                                    </button>
                                </div>
                            </template>

                            <template x-if="events.filter(e => e.day === days[currentDate.getDay()]).length === 0">
                                <div class="py-16">
                                    <p class="text-slate-600 italic">No events scheduled.</p>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <section class="bg-slate-900 p-6 rounded-2xl shadow-2xl border border-slate-800">
            <h3 class="font-bold text-slate-300 mb-4 flex items-center gap-2 uppercase tracking-widest text-xs">
                <span class="w-3 h-3 rounded-full shadow-[0_0_10px_rgba(59,130,246,0.5)]" :style="'background-color:' + newColor"></span>
                System Entry / Add Event
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-5 gap-4">
                <input x-model="newName" type="text" placeholder="Task/Subject Name" 
                    class="p-3 bg-slate-800 border border-slate-700 rounded-xl outline-none text-white focus:border-blue-500 transition">
                
                <select x-model="newDay" class="p-3 bg-slate-800 border border-slate-700 rounded-xl outline-none text-white focus:border-blue-500">
                    <template x-for="day in days"><option :value="day" x-text="day"></option></template>
                </select>

                <input x-model="newTime" type="time" class="p-3 bg-slate-800 border border-slate-700 rounded-xl outline-none text-white">

                <div class="flex items-center gap-3 px-3 bg-slate-800 border border-slate-700 rounded-xl">
                    <input type="color" x-model="newColor" class="w-8 h-8 rounded border-none bg-transparent cursor-pointer">
                    <span class="text-[10px] font-bold text-slate-500 uppercase">Color_Select</span>
                </div>

                <button @click="addEvent" 
                        class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-xl transition shadow-lg shadow-blue-900/20">
                    Submit Entry
                </button>
            </div>
        </section>
    </main>
</body>
</html>
