<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timetable MVP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/pocketbase/dist/pocketbase.umd.js"></script>
    <script defer src="js/app.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen" x-data="timetableApp()">

    <nav class="bg-white border-b p-4 mb-6">
        <h1 class="text-xl font-bold text-slate-800 max-w-[98%] mx-auto">My Schedule</h1>
    </nav>

    <main class="max-w-[98%] mx-auto px-4 py-4">
        
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 bg-white p-4 rounded-xl shadow-sm border border-slate-200">
            <div class="flex items-center gap-4">
                <h2 class="text-xl font-bold text-slate-800" x-text="getHeaderText()"></h2>
                <div class="flex bg-slate-100 rounded-lg p-1">
                    <button @click="prev()" class="p-2 hover:bg-white rounded-md transition">←</button>
                    <button @click="today()" class="px-4 py-2 hover:bg-white rounded-md text-sm font-medium">Today</button>
                    <button @click="next()" class="p-2 hover:bg-white rounded-md transition">→</button>
                </div>
            </div>

            <div class="flex bg-slate-100 rounded-lg p-1">
                <template x-for="mode in ['year', 'month', 'week', 'day']">
                    <button @click="viewMode = mode" 
                        class="px-4 py-2 rounded-md text-sm font-medium capitalize transition"
                        :class="viewMode === mode ? 'bg-white shadow-sm text-blue-600' : 'text-slate-500 hover:text-slate-700'"
                        x-text="mode"></button>
                </template>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden min-h-[600px] mb-8">
            
            <template x-if="viewMode === 'year'">
                <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6 p-6 bg-slate-50">
                    <template x-for="(m, mIdx) in grid" :key="'month-container-' + mIdx">
                        <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm cursor-pointer hover:border-blue-300 transition" 
                            @click="currentDate.setMonth(m.index); viewMode = 'month';">
                            <h4 class="font-bold text-slate-800 mb-2 text-sm" x-text="m.name"></h4>
                            <div class="grid grid-cols-7 gap-1">
                                <template x-for="(d, dIdx) in m.days" :key="'month-' + mIdx + '-day-' + dIdx">
                                    <div class="aspect-square flex items-center justify-center">
                                        <span class="text-[9px] w-4 h-4 flex items-center justify-center rounded-full"
                                            :class="d.current ? 'bg-blue-600 text-white' : 'text-slate-400'" x-text="d.day"></span>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>
                </div>
            </template>

            <template x-if="viewMode === 'month'">
                <div>
                    <div class="grid grid-cols-7 bg-slate-50/50 border-b">
                        <template x-for="dayName in days">
                            <div class="py-3 text-center text-xs font-bold text-slate-400 uppercase" x-text="dayName"></div>
                        </template>
                    </div>
                    <div class="grid grid-cols-7">
                        <template x-for="(item, idx) in grid" :key="'month-'+idx">
                            <div class="h-32 border-r border-b border-slate-50 p-2 hover:bg-slate-50 transition relative">
                                <span class="text-sm font-medium w-7 h-7 flex items-center justify-center rounded-full"
                                    :class="item.current ? 'bg-blue-600 text-white' : 'text-slate-700'" x-text="item.day"></span>
                            </div>
                        </template>
                    </div>
                </div>
            </template>

            <template x-if="viewMode === 'week'">
                <div class="grid grid-cols-7 divide-x divide-slate-100 min-h-[500px]">
                    <template x-for="day in grid">
                        <div class="flex flex-col items-center p-4">
                            <span class="text-xs font-bold text-slate-400 uppercase" x-text="day.name"></span>
                            <span class="text-lg font-bold mt-1 w-10 h-10 flex items-center justify-center rounded-full"
                                :class="day.isToday ? 'bg-blue-600 text-white' : 'text-slate-700'" x-text="day.date"></span>
                        </div>
                    </template>
                </div>
            </template>

            <template x-if="viewMode === 'day'">
                <div class="p-8 flex flex-col items-center min-h-[500px] relative overflow-hidden">
                    <div class="absolute top-0 right-6 select-none pointer-events-none">
                        <span class="text-[12rem] font-black text-slate-50/50 leading-none" x-text="currentDate.getDate()"></span>
                    </div>

                    <div class="text-center w-full max-w-2xl relative z-10">
                        <h3 class="text-4xl font-black text-slate-800 tracking-tight">
                            <span x-text="months[currentDate.getMonth()]"></span> 
                            <span x-text="currentDate.getDate() + getDaySuffix(currentDate.getDate())"></span>
                        </h3>
                        <p class="text-blue-600 font-bold uppercase tracking-[0.2em] text-sm mt-2" x-text="days[currentDate.getDay()]"></p>
                        
                        <div class="mt-12 space-y-4">
                            <template x-for="event in events.filter(e => e.day === days[currentDate.getDay()])" :key="event.id">
                                <div class="bg-white border border-slate-100 p-4 text-left rounded-2xl flex justify-between items-center shadow-sm hover:shadow-md transition-all">
                                    <div class="flex items-center gap-4">
                                        <div class="w-14 h-14 bg-slate-50 rounded-xl flex flex-col items-center justify-center border border-slate-100">
                                            <span class="text-blue-600 font-bold text-sm" x-text="event.start_time"></span>
                                        </div>
                                        <div>
                                            <p class="font-bold text-slate-800 text-lg" x-text="event.name"></p>
                                            <p class="text-xs text-slate-400 uppercase tracking-wider font-semibold" x-text="event.day"></p>
                                        </div>
                                    </div>
                                    <button @click="deleteEvent(event.id)" class="p-2 text-slate-200 hover:text-red-500 transition">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                        </svg>
                                    </button>
                                </div>
                            </template>

                            <template x-if="events.filter(e => e.day === days[currentDate.getDay()]).length === 0">
                                <div class="py-16">
                                    <div class="inline-flex items-center justify-center w-16 h-16 bg-slate-50 rounded-full mb-4">
                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-slate-200" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                                        </svg>
                                    </div>
                                    <p class="text-slate-400 italic">No events scheduled for this day.</p>
                                </div>
                            </template>
                        </div>
                    </div>
                </div>
            </template>
        </div>

        <section class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
            <h3 class="font-bold text-slate-800 mb-4 flex items-center gap-2">
                <span class="w-2 h-2 bg-blue-500 rounded-full"></span>
                Quick Add Event
            </h3>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input x-model="newName" type="text" placeholder="Subject Name" 
                    class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition">
                
                <select x-model="newDay" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition">
                    <template x-for="day in days"><option :value="day" x-text="day"></option></template>
                </select>

                <input x-model="newTime" type="time" 
                    class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition">

                <button @click="addEvent" 
                        class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-blue-200 transition active:scale-95">
                    Add to Timetable
                </button>
            </div>
        </section>
    </main>
</body>
</html>
