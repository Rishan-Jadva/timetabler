<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Timetable MVP | Dark Mode</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/pocketbase/dist/pocketbase.umd.js"></script>
    <script defer src="js/app.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-slate-950 text-slate-200 min-h-screen font-sans" x-data="timetableApp()" x-cloak>

    <nav class="bg-slate-900/50 backdrop-blur-md sticky top-0 z-50 border-b border-slate-800 p-4">
        <div class="max-w-[98%] mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-xl font-black text-white tracking-tighter italic">CHRON<span class="text-blue-500">OS</span></h1>
            <div class="flex items-center gap-4">
                <div class="relative">
                    <input type="text" x-model="searchQuery" placeholder="Search events..." 
                        class="bg-slate-800 border border-slate-700 rounded-full px-5 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none transition w-48 md:w-64">
                </div>
                <button @click="showSettings = !showSettings" 
                    class="text-xs font-bold uppercase tracking-widest bg-slate-800 hover:bg-slate-700 px-5 py-2.5 rounded-full border border-slate-700 transition text-slate-300">
                    <span x-text="showSettings ? 'Close' : 'Color Categories'"></span>
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-[98%] mx-auto px-4 py-8">
        
        <template x-if="showSettings">
            <div class="mb-12 animate-in fade-in zoom-in-95 duration-300">
                <section class="bg-slate-900 p-8 rounded-3xl border border-slate-800 shadow-2xl">
                    <div class="flex justify-between items-center mb-8">
                        <h3 class="text-sm font-black text-slate-500 uppercase tracking-[0.3em]">Event Color Categories</h3>
                    </div>
                    
                    <div class="flex flex-wrap gap-4 mb-8 p-6 bg-slate-950 rounded-2xl border border-slate-800">
                        <input x-model="newCatName" type="text" placeholder="Category Name" class="flex-1 min-w-[200px] p-3 bg-slate-800 border border-slate-700 rounded-xl text-white outline-none focus:border-blue-500">
                        <input type="color" x-model="newCatColor" class="w-12 h-12 rounded-lg border-none bg-transparent cursor-pointer">
                        <button @click="addCategory" class="bg-blue-600 hover:bg-blue-500 text-white px-8 py-3 rounded-xl font-black text-xs uppercase tracking-widest transition">Add</button>
                    </div>

                    <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-4">
                        <template x-for="cat in categories" :key="cat.id">
                            <div class="p-3 rounded-xl border flex justify-between items-center group transition-all hover:scale-105" :style="getStyle(cat.color)">
                                <span class="font-bold uppercase text-[10px]" x-text="cat.name"></span>
                                <button @click="deleteCategory(cat.id)" class="opacity-0 group-hover:opacity-100 text-red-500 transition-opacity">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                                </button>
                            </div>
                        </template>
                    </div>
                </section>
            </div>
        </template>

        <template x-if="!showSettings">
            <div>
                <div class="flex flex-col lg:flex-row justify-between items-center mb-8 gap-6">
                    <div class="flex items-center gap-6">
                        <div class="text-left">
                            <h2 class="text-4xl font-black text-white leading-none mb-1">
                                <span x-text="getHeaderText().main"></span>
                                
                                <template x-if="getHeaderText().details">
                                    <span class="text-xl font-bold text-slate-500 ml-2 tracking-tight" 
                                        x-text="getHeaderText().details"></span>
                                </template>
                            </h2>
                            <p class="text-blue-500 font-bold text-xs uppercase tracking-[0.2em]" 
                            x-text="getHeaderText().sub"></p>
                        </div>
                        <div class="flex bg-slate-900 rounded-2xl p-1.5 border border-slate-800 shadow-xl">
                            <button @click="prev()" class="p-3 hover:bg-slate-800 text-slate-300 rounded-xl transition">←</button>
                            <button @click="today()" class="px-6 py-2 hover:bg-slate-800 text-slate-200 rounded-xl text-xs font-black uppercase tracking-widest">Today</button>
                            <button @click="next()" class="p-3 hover:bg-slate-800 text-slate-300 rounded-xl transition">→</button>
                        </div>
                    </div>

                    <div class="flex bg-slate-900 rounded-2xl p-1.5 border border-slate-800 shadow-xl">
                        <template x-for="mode in ['year', 'month', 'week', 'day']">
                            <button @click="viewMode = mode; render();" 
                                class="px-6 py-3 rounded-xl text-xs font-black uppercase tracking-widest transition"
                                :class="viewMode === mode ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500 hover:text-slate-300'"
                                x-text="mode"></button>
                        </template>
                    </div>
                </div>

                <div class="bg-slate-900 rounded-[2.5rem] shadow-2xl border border-slate-800/50 overflow-hidden mb-12">
                    
                    <template x-if="viewMode === 'year'">
                        <div class="p-8 year-grid animate-in fade-in zoom-in-95 duration-500">
                            <template x-for="(monthName, mIdx) in months" :key="mIdx">
                                <div class="bg-slate-950/50 p-4 rounded-2xl border border-slate-800/50">
                                    <h4 class="text-white font-black text-xs uppercase tracking-widest mb-3" x-text="monthName"></h4>
                                    <div class="grid grid-cols-7 gap-1">
                                        <template x-for="day in generateMonthDays(currentDate.getFullYear(), mIdx)" :key="day.id">
                                            <div class="mini-day relative group cursor-pointer"
                                                :class="day.current ? 'bg-blue-600/20 border border-blue-500/50 text-blue-400' : 'text-slate-600 hover:bg-slate-800'"
                                                @click="currentDate = new Date(currentDate.getFullYear(), mIdx, day.num); viewMode = 'day'; render();">
                                                <span x-text="day.num"></span>
                                                <template x-if="getEventsForDay(day.date).length > 0">
                                                    <div class="absolute -top-1 -right-1 w-1.5 h-1.5 bg-blue-500 rounded-full shadow-[0_0_8px_rgba(59,130,246,0.8)]"></div>
                                                </template>
                                                <div class="hidden group-hover:block absolute bottom-full left-1/2 -translate-x-1/2 mb-2 w-32 bg-slate-800 p-2 rounded-lg text-[9px] z-50 shadow-2xl border border-slate-700 text-white">
                                                    <span x-text="getEventsForDay(day.date).length"></span> Events
                                                </div>
                                            </div>
                                        </template>
                                    </div>
                                </div>
                            </template>
                        </div>
                    </template>

                    <template x-if="viewMode === 'month'">
                        <div class="animate-in fade-in duration-500">
                            <div class="grid grid-cols-7 bg-slate-800/20 border-b border-slate-800">
                                <template x-for="dayName in days">
                                    <div class="py-4 text-center text-[10px] font-black text-slate-500 uppercase tracking-widest" x-text="dayName"></div>
                                </template>
                            </div>
                            <div class="grid grid-cols-7">
                                <template x-for="(item, idx) in grid" :key="'month-'+idx">
                                    <div class="h-32 border-r border-b border-slate-800/50 p-2 hover:bg-slate-800/30 transition relative group cursor-pointer"
                                         @click="if(item.fullDate) { currentDate = item.fullDate; viewMode = 'day'; }">
                                        <span class="text-sm font-black w-8 h-8 flex items-center justify-center rounded-xl transition"
                                            :class="item.current ? 'bg-blue-600 text-white shadow-lg' : 'text-slate-500'" x-text="item.day"></span>
                                        <div class="mt-2 flex flex-col gap-1 overflow-hidden px-1">
                                            <template x-for="event in getEventsForDay(item.fullDate).slice(0, 3)" :key="event.id">
                                                <div class="h-1 w-full rounded-full" :style="'background-color:' + (event.color || '#3b82f6')"></div>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>

                    <template x-if="viewMode === 'week'">
                        <div class="animate-in fade-in duration-500">
                            <div class="grid grid-cols-7 bg-slate-800/20 border-b border-slate-800">
                                <template x-for="dayName in days">
                                    <div class="py-4 text-center text-[10px] font-black text-slate-500 uppercase tracking-widest" x-text="dayName"></div>
                                </template>
                            </div>
                            <div class="grid grid-cols-7">
                                <template x-for="(item, idx) in grid" :key="'week-'+idx">
                                    <div class="h-[600px] border-r border-slate-800/50 p-3 hover:bg-slate-800/10 transition cursor-pointer"
                                         @click="currentDate = item.fullDate; viewMode = 'day';">
                                        <div class="text-center mb-6">
                                            <span class="text-xl font-black" :class="item.current ? 'text-blue-500' : 'text-slate-700'" x-text="item.day"></span>
                                        </div>
                                        <div class="space-y-3">
                                            <template x-for="event in getEventsForDay(item.fullDate)" :key="event.id">
                                                <div class="p-2.5 rounded-xl border group relative transition hover:scale-105" :style="getStyle(event.color)">
                                                    <p class="text-[10px] font-black uppercase mb-1 truncate" x-text="event.name"></p>
                                                    <div class="flex items-center gap-1 text-[8px] font-mono opacity-80">
                                                        <span x-text="event.start_time"></span> - <span x-text="event.end_time"></span>
                                                    </div>
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </template>
                            </div>
                        </div>
                    </template>

                    <template x-if="viewMode === 'day'">
                        <div class="p-8 lg:p-20 min-h-[600px] bg-slate-900 animate-in slide-in-from-bottom-8 duration-700">
                            <div class="max-w-4xl mx-auto">
                                <div class="flex items-end justify-between mb-16 pb-8 border-b border-slate-800">
                                    <div>
                                        <h3 class="text-6xl font-black text-white tracking-tighter" x-text="currentDate.getDate()"></h3>
                                        <p class="text-xl font-bold text-slate-500 uppercase tracking-widest" x-text="months[currentDate.getMonth()] + ' ' + currentDate.getFullYear()"></p>
                                    </div>
                                    <div class="text-right">
                                        <p class="text-blue-500 font-black text-sm uppercase tracking-widest" x-text="days[currentDate.getDay()]"></p>
                                        <p class="text-slate-600 text-xs font-bold" x-text="getEventsForDay(currentDate).length + ' EVENTS'"></p>
                                    </div>
                                </div>
                                
                                <div class="space-y-0"> <template x-for="event in getEventsForDay(currentDate)" :key="event.id">
                                        <div class="flex gap-8 group">
                                            <div class="w-20 pt-4 text-right shrink-0">
                                                <span class="text-xs font-black text-slate-400 font-mono tracking-tighter" x-text="event.start_time"></span>
                                            </div>

                                            <div class="relative w-4 flex justify-center">
                                                <div class="absolute top-0 bottom-0 w-px bg-slate-800 group-last:h-12"></div>
                                                <div class="z-10 mt-5 w-3 h-3 rounded-full border-2 border-slate-900 shadow-[0_0_10px_rgba(0,0,0,0.5)]" 
                                                    :style="'background-color:' + (event.color || '#3b82f6')"></div>
                                            </div>
                                            
                                            <div class="flex-1 pb-10">
                                                <div class="bg-slate-800/40 p-6 rounded-3xl border border-slate-700/50 flex justify-between items-center transition hover:bg-slate-800 hover:border-blue-500/50 shadow-xl group-hover:-translate-y-1 duration-300">
                                                    <div>
                                                        <span class="text-[9px] font-black px-2 py-1 rounded bg-white/5 uppercase tracking-widest mb-2 inline-block" 
                                                            :style="'color:' + (event.color)" x-text="event.category"></span>
                                                        <h4 class="text-xl font-bold text-white mb-1" x-text="event.name"></h4>
                                                        <p class="text-xs text-slate-500 font-medium italic">Ends at <span x-text="event.end_time"></span></p>
                                                    </div>
                                                    <button @click.stop="triggerDelete(event, currentDate)" class="p-3 rounded-2xl bg-red-500/5 text-red-500/20 hover:text-red-500 hover:bg-red-500/10 transition-all">
                                                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                                        </svg>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                    </template>
                                    
                                    <template x-if="getEventsForDay(currentDate).length === 0">
                                        <div class="text-center py-24 bg-slate-950/30 rounded-[3rem] border border-dashed border-slate-800">
                                            <p class="text-slate-700 font-black text-xs uppercase tracking-[0.5em]">No Data Recorded</p>
                                        </div>
                                    </template>
                                </div>
                            </div>
                        </div>
                    </template>
                </div>

                <section class="bg-slate-900 p-8 md:p-12 rounded-[3rem] border border-slate-800/50 shadow-2xl relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-64 h-64 bg-blue-600/5 blur-[100px] rounded-full"></div>
                    
                    <div class="relative z-10">
                        <h3 class="font-black text-white mb-8 text-[14px] uppercase tracking-[0.4em]">Initialize Event</h3>                        
                        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10 items-start">
                            
                            <div class="lg:col-span-9 grid grid-cols-1 md:grid-cols-2 gap-8">
                                
                                <div class="space-y-6">
                                    <div class="space-y-2">
                                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-500 ml-1">Event Title</label>
                                        <input x-model="newName" type="text" placeholder="e.g. Math Class" class="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-white font-bold outline-none focus:ring-2 focus:ring-blue-500 transition">
                                    </div>

                                    <div class="grid grid-cols-2 gap-4">
                                        <div class="space-y-2">
                                            <label class="text-[10px] font-black uppercase tracking-widest text-slate-500 ml-1">Date</label>
                                            <input x-model="newDate" type="date" class="w-full bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm text-white outline-none focus:border-blue-500">
                                        </div>
                                        <div class="space-y-2">
                                            <div class="flex justify-between items-center ml-1">
                                                <label class="text-[10px] font-black uppercase tracking-widest text-slate-500">Category / Color</label>
                                                <button @click="colorMode = colorMode === 'cat' ? 'hex' : 'cat'" 
                                                        class="text-[9px] font-bold uppercase text-blue-500 hover:text-white transition">
                                                    <span x-text="colorMode === 'cat' ? 'Switch to Custom Hex' : 'Switch to Categories'"></span>
                                                </button>
                                            </div>

                                            <template x-if="colorMode === 'cat'">
                                                <div class="grid grid-cols-2 gap-2 max-h-[168px] overflow-y-auto p-1 pr-2 scrollbar-thin scrollbar-thumb-slate-700">
                                                    <template x-for="cat in categories" :key="cat.id">
                                                        <button @click="selectedCategoryId = cat.id" 
                                                                class="p-3 rounded-xl border text-[10px] font-black uppercase tracking-tight transition-all text-left flex items-center gap-2"
                                                                :class="selectedCategoryId === cat.id ? 'ring-2 ring-white border-transparent' : 'border-slate-800 opacity-60 hover:opacity-100'"
                                                                :style="getStyle(cat.color)">
                                                            <div class="w-2 h-2 rounded-full" :style="'background-color:' + cat.color"></div>
                                                            <span x-text="cat.name" class="truncate"></span>
                                                        </button>
                                                    </template>
                                                </div>
                                            </template>

                                            <template x-if="colorMode === 'hex'">
                                                <div class="flex gap-3 bg-slate-950 border border-slate-800 p-3 rounded-2xl h-[54px] items-center">
                                                    <input type="color" x-model="newColor" class="w-10 h-full bg-transparent border-none cursor-pointer">
                                                    <input type="text" x-model="newColor" class="bg-transparent text-xs font-mono text-white outline-none w-full" placeholder="#000000">
                                                </div>
                                            </template>
                                        </div>
                                    </div>
                                </div>

                                <div class="space-y-6">
                                    <div class="space-y-2">
                                        <label class="text-[10px] font-black uppercase tracking-widest text-slate-500 ml-1">Time Range</label>
                                        <div class="flex items-center gap-3">
                                            <input x-model="newTime" type="time" class="flex-1 bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm text-white">
                                            <span class="text-slate-700 font-bold">to</span>
                                            <input x-model="newEndTime" type="time" class="flex-1 bg-slate-950 border border-slate-800 p-4 rounded-2xl text-sm text-white">
                                        </div>
                                    </div>

                                    <div class="pt-2 min-h-[160px]">
                                        <label class="flex items-center gap-3 cursor-pointer group mb-4 w-max">
                                            <input type="checkbox" x-model="isRecurring" class="w-5 h-5 rounded bg-slate-950 border-slate-700 text-blue-600 focus:ring-0">
                                            <span class="text-[10px] font-black uppercase text-slate-500 group-hover:text-blue-500 transition">Enable Recurrence</span>
                                        </label>

                                        <div x-show="isRecurring" x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 -translate-y-2" class="grid grid-cols-2 gap-4">
                                            <div class="space-y-2">
                                                <label class="text-[9px] font-bold text-slate-600 uppercase">Frequency</label>
                                                <select x-model="recurrenceRule" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-xs font-bold text-white outline-none">
                                                    <option value="daily">Daily</option>
                                                    <option value="weekly">Weekly</option>
                                                    <option value="monthly">Monthly</option>
                                                </select>
                                            </div>
                                            <div class="space-y-2">
                                                <label class="text-[9px] font-bold text-slate-600 uppercase">End Date</label>
                                                <input x-model="recurrenceEnd" type="date" class="w-full bg-slate-950 border border-slate-800 p-3 rounded-xl text-xs text-white outline-none">
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            <div class="lg:col-span-3 h-full">
                                <div class="lg:pt-6"> <button @click="addEvent" class="w-full bg-blue-600 hover:bg-blue-500 text-white p-8 rounded-[2rem] flex flex-col items-center justify-center gap-4 transition group shadow-2xl shadow-blue-600/20 active:scale-95">
                                        <div class="bg-white/20 p-3 rounded-full group-hover:rotate-90 transition-transform duration-300">
                                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M12 4v16m8-8H4" /></svg>
                                        </div>
                                        <span class="text-xs font-black uppercase tracking-[0.3em]">Add Event</span>
                                    </button>
                                </div>
                            </div>

                        </div>
                    </div>
                </section>
            </div>
        </template>
    </main>
    <div x-show="showDeleteModal" 
        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0"
        x-transition:enter-end="opacity-100"
        x-transition:leave="transition ease-in duration-200"
        x-transition:leave-start="opacity-100"
        x-transition:leave-end="opacity-0"
        class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-sm">
        
        <div @click.away="showDeleteModal = false" 
            class="bg-slate-900 border border-slate-800 p-8 rounded-[2.5rem] max-w-sm w-full shadow-2xl animate-in zoom-in-95 duration-300">
            
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-red-500/10 text-red-500 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                    </svg>
                </div>
                <h3 class="text-xl font-black text-white mb-2">Manage Recurring Event</h3>
                <p class="text-slate-400 text-xs font-medium uppercase tracking-widest leading-relaxed">
                    Choose how you want to handle this deletion.
                </p>
            </div>

            <div class="space-y-3">
                <button @click="confirmDelete('single')" 
                        class="w-full py-4 bg-slate-800 hover:bg-slate-700 text-white rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] transition border border-slate-700">
                    Delete only today
                </button>
                
                <button @click="confirmDelete('all')" 
                        class="w-full py-4 bg-red-600/10 hover:bg-red-600 text-red-500 hover:text-white rounded-2xl font-black text-[10px] uppercase tracking-[0.2em] transition border border-red-500/20">
                    Delete entire series
                </button>
                
                <button @click="showDeleteModal = false" 
                        class="w-full py-4 text-slate-500 hover:text-white font-black text-[10px] uppercase tracking-[0.2em] transition">
                    Cancel
                </button>
            </div>
        </div>
    </div>
</body>
</html>
